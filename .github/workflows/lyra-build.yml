name: Lyra Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SOLUTION_PATH: ${{ github.workspace }}\Files.slnx
  APP_PROJECT_PATH: ${{ github.workspace }}\src\Files.App\Files.App.csproj
  APPX_PACKAGE_DIR: ${{ github.workspace }}\artifacts\AppxPackages\
  APPX_SELFSIGNED_CERT_PATH: ${{ github.workspace }}\.github\workflows\LyraApp_SelfSigned.pfx

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Lyra
        shell: pwsh
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform=x64 `
            -p:Configuration=Release `
            -p:PublishReadyToRun=true `
            -v:minimal

      - name: Create self-signed packaging certificate
        shell: pwsh
        run: ./.github/scripts/Generate-SelfCertPfx.ps1 -Destination "$env:APPX_SELFSIGNED_CERT_PATH"

      - name: Build and package Lyra
        shell: pwsh
        run: |
          msbuild $env:APP_PROJECT_PATH `
            -t:Build `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:AppxBundlePlatforms=x64 `
            -p:AppxBundle=Always `
            -p:GenerateAppxPackageOnBuild=true `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxPackageDir="$env:APPX_PACKAGE_DIR" `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateKeyFile="$env:APPX_SELFSIGNED_CERT_PATH" `
            -p:PackageCertificatePassword="" `
            -p:PackageCertificateThumbprint="" `
            -v:minimal

      - name: Upload Lyra package
        uses: actions/upload-artifact@v7
        with:
          name: Lyra-x64-package
          path: ${{ github.workspace }}\artifacts
